<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeedIn - Ativar Acesso Biométrico</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card-biometria { max-width: 450px; width: 100%; border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); }
        .icon-shield { font-size: 3rem; color: #0d6efd; }
    </style>
</head>
<body>

<div class="container p-3">
    <div class="row justify-content-center">
        <div class="card card-biometria p-4 text-center">

            <div class="mb-3">
                <span class="icon-shield">🛡️</span>
            </div>

            <h3 class="fw-bold mb-2">Ativar Acesso Biométrico</h3>
            <p class="text-muted small mb-4">
                Vincule este dispositivo à sua conta do FeedIn para acessar rapidamente usando seu Face ID, Digital ou PIN nos próximos acessos.
            </p>

            <div id="erro-mensagem" class="alert alert-danger d-none small text-start" role="alert"></div>

            <button type="button" class="btn btn-primary btn-lg w-100 rounded-3 mb-2" id="btn-ativar" onclick="iniciarCadastroBiometrico()">
                Ativar Biometria neste Dispositivo
            </button>

            <a href="/feed" class="text-decoration-none small text-secondary d-block mt-3">
                Voltar para o Painel
            </a>

        </div>
    </div>
</div>

<script>
// Conversores robustos Base64URL <-> ArrayBuffer
function ueb64ParaBytes(strBase64Url) {
    let base64 = strBase64Url.replace(/-/g, '+').replace(/_/g, '/');
    while (base64.length % 4) { base64 += '='; }
    const binario = window.atob(base64);
    const bytes = new Uint8Array(binario.length);
    for (let i = 0; i < binario.length; i++) { bytes[i] = binario.charCodeAt(i); }
    return bytes.buffer;
}

function bytesParaUeb64(arrayBuffer) {
    const bytes = new Uint8Array(arrayBuffer);
    let binario = '';
    for (let i = 0; i < bytes.byteLength; i++) { binario += String.fromCharCode(bytes[i]); }
    return window.btoa(binario).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function iniciarCadastroBiometrico() {
    const btn = document.getElementById('btn-ativar');
    const erroDiv = document.getElementById('erro-mensagem');

    btn.disabled = true;
    btn.innerText = "Solicitando desafio...";
    erroDiv.classList.add('d-none');

    try {
        // Passo 1: Solicita o desafio para a VPS (A rota identifica quem você é de forma invisível)
        const resposta = await fetch('/ativar-biometria', { method: 'POST' });
        if (!resposta.ok) throw new Error(`Erro no servidor (Status ${resposta.status}).`);
        const resultado = await resposta.json();

        if (resultado.status === 'erro') throw new Error(resultado.mensagem);

        btn.innerText = "Aguardando biometria...";
        const opt = resultado.options.publicKey;
        opt.challenge = ueb64ParaBytes(opt.challenge);
        if (opt.user && opt.user.id) { opt.user.id = ueb64ParaBytes(opt.user.id); }

        // Aciona o sensor físico do dispositivo
        const credencialNativa = await navigator.credentials.create({ publicKey: opt });

        // Embala a chave pública
        const dadosParaEnviar = {
            id: credencialNativa.id,
            rawId: credencialNativa.id,
            type: credencialNativa.type,
            response: {
                attestationObject: bytesParaUeb64(credencialNativa.response.attestationObject),
                clientDataJSON: bytesParaUeb64(credencialNativa.response.clientDataJSON)
            }
        };

        btn.innerText = "Salvando credencial...";
        const respostaServidor = await fetch('/concluir-cadastro-biometria', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dadosParaEnviar)
        });

        if (!respostaServidor.ok) throw new Error("Erro ao salvar a credencial na VPS.");
        const resultadoFinal = await respostaServidor.json();

        if (resultadoFinal.status === 'sucesso') {
            alert("Biometria vinculada com sucesso!");
            window.location.href = '/feed';
        } else {
            throw new Error(resultadoFinal.mensagem || "Erro no registro.");
        }

    } catch (error) {
        console.error(error);
        erroDiv.innerText = error.message;
        erroDiv.classList.remove('d-none');
        btn.disabled = false;
        btn.innerText = "Ativar Biometria neste Dispositivo";
    }
}
</script>
</body>
</html>
