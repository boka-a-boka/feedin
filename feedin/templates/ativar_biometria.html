<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeedIn - Ativar Acesso Biométrico</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-biometria {
            max-width: 450px;
            width: 100%;
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        .icon-shield {
            font-size: 3rem;
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="container p-3">
    <div class="row justify-content-center">
        <div class="card card-biometria p-4 text-center">

            <!-- Ícone visual -->
            <div class="mb-3">
                <span class="icon-shield">🛡️</span>
            </div>

            <h3 class="fw-bold mb-2">Primeiro Acesso Biométrico</h3>
            <p class="text-muted small mb-4">
                Identificamos que este é seu primeiro acesso via biometria neste dispositivo.
                Por segurança, confirme seus dados para vincular o seu Face ID, Digital ou PIN.
            </p>

            <!-- Alerta de Erro dinâmico (mostra o motivo real do erro na tela) -->
            <div id="erro-mensagem" class="alert alert-danger d-none small text-start" role="alert"></div>

            <!-- Formulário Unificado -->
            <form id="form-biometria">
                <!-- Segurança: Gera o token CSRF obrigatório para o VPS aceitar o POST -->
                <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">

                <div class="form-floating mb-3 text-start">
                    <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
                    <label for="email">Seu e-mail do FeedIn</label>
                </div>

                <div class="form-floating mb-4 text-start">
                    <input type="password" class="form-control" id="senha" placeholder="Senha" required>
                    <label for="senha">Sua senha do FeedIn</label>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 mb-2" id="btn-ativar">
                    Validar e Ativar Biometria
                </button>

                <a href="/login" class="text-decoration-none small text-secondary d-block mt-3">
                    Voltar para o login tradicional
                </a>
            </form>

        </div>
    </div>
</div>

<script>
document.getElementById('form-biometria').addEventListener('submit', async function(e) {
    e.preventDefault();

    console.log("Iniciando o processo de vínculo biométrico...");

    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;
    const btn = document.getElementById('btn-ativar');
    const erroDiv = document.getElementById('erro-mensagem');
    const csrfTokenInput = document.querySelector('input[name="csrf_token"]');

    // Estado visual de carregamento (previne duplo clique)
    btn.disabled = true;
    btn.innerText = "Validando dados no servidor...";
    erroDiv.classList.add('d-none');

    // Configura os cabeçalhos da requisição com a proteção CSRF do Flask
    const headers = { 'Content-Type': 'application/json' };
    if (csrfTokenInput && csrfTokenInput.value) {
        headers['X-CSRFToken'] = csrfTokenInput.value;
    }

    const dadosParaEnvio = { email: email, senha: senha };

    try {
        // Dispara a comunicação direta usando a origem correta do VPS (via HTTPS)
        const resposta = await fetch(`${window.location.origin}/ativar-biometria`, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(dadosParaEnvio)
        });

        // Se o Nginx ou o Flask recusarem o acesso (Erros 403, 404, 500)
        if (!resposta.ok) {
            throw new Error(`Erro de resposta do servidor (Status ${resposta.status}).`);
        }

        const resultado = await resposta.json();

        // Se o seu Python validar a senha e retornar um erro de negócio
        if (resultado.status === 'erro') {
            throw new Error(resultado.mensagem);
        }

        // Caso de sucesso total: desafio WebAuthn gerado
        if (resultado.status === 'sucesso' && resultado.options) {
            console.log("Desafio gerado com sucesso pelo Flask:", resultado.options);
            alert("Sucesso! O Flask gerou o desafio criptográfico universal (WebAuthn).");

            // Redireciona de volta para concluir o login
            window.location.href = '/login';
        }

    } catch (error) {
        console.error("Erro capturado no fluxo:", error);

        // Exibe o erro real diretamente na caixinha vermelha do HTML
        erroDiv.innerText = error.message || "Erro de conexão: Não foi possível alcançar o servidor.";
        erroDiv.classList.remove('d-none');

        // Destrava o botão para o usuário tentar novamente sem precisar atualizar a página
        btn.disabled = false;
        btn.innerText = "Validar e Ativar Biometria";
    }
});
</script>

</body>
</html>
