<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeedIn - Ativar Acesso Biométrico</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-biometria {
            max-width: 450px;
            width: 100%;
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        .icon-shield {
            font-size: 3rem;
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="container p-3">
    <div class="row justify-content-center">
        <div class="card card-biometria p-4 text-center">

            <!-- Ícone visual -->
            <div class="mb-3">
                <span class="icon-shield">🛡️</span>
            </div>

            <h3 class="fw-bold mb-2">Primeiro Acesso Biométrico</h3>
            <p class="text-muted small mb-4">
                Identificamos que este é seu primeiro acesso via biometria neste dispositivo.
                Por segurança, confirme seus dados para vincular o seu Face ID, Digital ou PIN.
            </p>

            <!-- Alerta de Erro dinâmico -->
            <div id="erro-mensagem" class="alert alert-danger d-none small text-start" role="alert"></div>

            <!-- Formulário Unificado -->
            <form id="form-biometria">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">

                <div class="form-floating mb-3 text-start">
                    <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
                    <label for="email">Seu e-mail do FeedIn</label>
                </div>

                <div class="form-floating mb-4 text-start">
                    <input type="password" class="form-control" id="senha" placeholder="Senha" required>
                    <label for="senha">Sua senha do FeedIn</label>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 mb-2" id="btn-ativar">
                    Validar e Ativar Biometria
                </button>

                <a href="/login" class="text-decoration-none small text-secondary d-block mt-3">
                    Voltar para o login tradicional
                </a>
            </form>

        </div>
    </div>
</div>

<script>
// Forçamos a declaração explícita da biblioteca direto no escopo do script
const webauthnJson = (function() {
    "use strict";
    function t(e){const t=new Uint8Array(e);let n="";for(const e of t)n+=String.fromCharCode(e);return btoa(n).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"")}
    function n(e){const t=e.replace(/-/g,"+").replace(/_/g,"/"),n=(window.atob(t)+"\0\0\0\0\0\0\0").substring(0,4*(Math.ceil(t.length/4))),r=new Uint8Array(n.length);for(let e=0;e<n.length;e++)r[e]=n.charCodeAt(e);return r.buffer}
    function r(e){if(e instanceof ArrayBuffer)return t(e);if(e instanceof Array)return e.map(r);if("object"==typeof e&&null!==e){const t={};for(const n of Object.keys(e))t[n]=r(e[n]);return t}return e}
    function o(e,t){if("string"==typeof t)return n(t);if(t instanceof Array)return t.map((t=>o(e,t)));if("object"==typeof t&&null!==t){const n={};for(const r of Object.keys(t))n[r]=o(e+"."+r,t[r]);return n}return t}
    return {
        create: function(t) {
            const n = o("publicKey", t);
            return navigator.credentials.create({publicKey: n}).then((e => r(e)));
        },
        get: function(t) {
            const n = o("publicKey", t);
            return navigator.credentials.get({publicKey: n}).then((e => r(e)));
        }
    };
})();

document.getElementById('form-biometria').addEventListener('submit', async function(e) {
    e.preventDefault();

    console.log("Iniciando o processo de vínculo biométrico...");

    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;
    const btn = document.getElementById('btn-ativar');
    const erroDiv = document.getElementById('erro-mensagem');
    const csrfTokenInput = document.querySelector('input[name="csrf_token"]');

    btn.disabled = true;
    btn.innerText = "Validando dados no servidor...";
    erroDiv.classList.add('d-none');

    const headers = { 'Content-Type': 'application/json' };
    if (csrfTokenInput && csrfTokenInput.value) {
        headers['X-CSRFToken'] = csrfTokenInput.value;
    }

    const dadosParaEnvio = { email: email, senha: senha };

    try {
        // 1. Valida e-mail e senha no Flask e busca o desafio (challenge)
        const resposta = await fetch(`${window.location.origin}/ativar-biometria`, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(dadosParaEnvio)
        });

        if (!resposta.ok) {
            throw new Error(`Erro de resposta do servidor (Status ${resposta.status}).`);
        }

        const resultado = await resposta.json();

        if (resultado.status === 'erro') {
            throw new Error(resultado.mensagem);
        }

        if (resultado.status === 'sucesso' && resultado.options) {
            console.log("Desafio recebido do Flask. Acionando hardware local...");
            btn.innerText = "Aguardando Face ID / Digital...";

            let respostaBiometrica;

            try {
                // Chamada direta para a constante local blindada, sem passar por window
                respostaBiometrica = await webauthnJson.create({ "publicKey": resultado.options });
                console.log("Biometria capturada com sucesso!");
            } catch (hardwareError) {
                console.warn("Hardware biométrico rejeitado:", hardwareError);
                throw new Error(`Erro nativo do dispositivo: [${hardwareError.name}] - ${hardwareError.message}`);
            }

            console.log("Enviando credencial gerada para o banco de dados...");
            btn.innerText = "Salvando credencial criptográfica...";

            const headersConclusao = { 'Content-Type': 'application/json' };
            if (csrfTokenInput && csrfTokenInput.value) {
                headersConclusao['X-CSRFToken'] = csrfTokenInput.value;
            }

            // 2. Envia a assinatura gerada para persistir no banco do VPS
            const respostaServidor = await fetch('/concluir-cadastro-biometria', {
                method: 'POST',
                headers: headersConclusao,
                body: JSON.stringify(respostaBiometrica)
            });

            if (!respostaServidor.ok) {
                throw new Error(`Erro ao concluir cadastro no servidor (Status ${respostaServidor.status}).`);
            }

            const resultadoFinal = await respostaServidor.json();

            if (resultadoFinal.status === 'sucesso') {
                alert("Face ID / Biometria vinculada com sucesso no FeedIn!");
                window.location.href = '/login';
            } else {
                throw new Error(resultadoFinal.mensagem || "Erro interno do servidor ao registrar credencial.");
            }
        }

    } catch (error) {
        console.error("Erro capturado no fluxo:", error);

        erroDiv.innerText = error.message || "Não foi possível processar o acesso biométrico.";
        erroDiv.classList.remove('d-none');

        btn.disabled = false;
        btn.innerText = "Validar e Ativar Biometria";
    }
});
</script>

</body>
</html>
