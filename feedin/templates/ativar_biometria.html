<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeedIn - Ativar Acesso Biométrico</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-biometria {
            max-width: 450px;
            width: 100%;
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        .icon-shield {
            font-size: 3rem;
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="container p-3">
    <div class="row justify-content-center">
        <div class="card card-biometria p-4 text-center">

            <div class="mb-3">
                <span class="icon-shield">🛡️</span>
            </div>

            <h3 class="fw-bold mb-2">Primeiro Acesso Biométrico</h3>
            <p class="text-muted small mb-4">
                Identificamos que este é seu primeiro acesso via biometria neste dispositivo.
                Por segurança, confirme seus dados para vincular o seu Face ID, Digital ou PIN.
            </p>

            <div id="erro-mensagem" class="alert alert-danger d-none small text-start" role="alert"></div>

            <form id="form-biometria">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">

                <div class="form-floating mb-3 text-start">
                    <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
                    <label for="email">Seu e-mail do FeedIn</label>
                </div>

                <div class="form-floating mb-4 text-start">
                    <input type="password" class="form-control" id="senha" placeholder="Senha" required>
                    <label for="senha">Sua senha do FeedIn</label>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 mb-2" id="btn-ativar">
                    Validar e Ativar Biometria
                </button>

                <a href="/login" class="text-decoration-none small text-secondary d-block mt-3">
                    Voltar para o login tradicional
                </a>
            </form>

        </div>
    </div>
</div>

<script>
// Conversores corrigidos para a sintaxe nativa do JavaScript (function)
function ueb64ParaBytes(strBase64Url) {
    let base64 = strBase64Url.replace(/-/g, '+').replace(/_/g, '/');
    while (base64.length % 4) { base64 += '='; }
    const binario = window.atob(base64);
    const bytes = new Uint8Array(binario.length);
    for (let i = 0; i < binario.length; i++) {
        bytes[i] = binario.charCodeAt(i);
    }
    return bytes.buffer;
}

function bytesParaUeb64(arrayBuffer) {
    const bytes = new Uint8Array(arrayBuffer);
    let binario = '';
    for (let i = 0; i < bytes.byteLength; i++) {
        binario += String.fromCharCode(bytes[i]);
    }
    return window.btoa(binario).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

document.getElementById('form-biometria').addEventListener('submit', async function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;
    const btn = document.getElementById('btn-ativar');
    const erroDiv = document.getElementById('erro-mensagem');
    const csrfTokenInput = document.querySelector('input[name="csrf_token"]');

    btn.disabled = true;
    btn.innerText = "Validando dados...";
    erroDiv.classList.add('d-none');

    const headers = { 'Content-Type': 'application/json' };
    if (csrfTokenInput && csrfTokenInput.value) {
        headers['X-CSRFToken'] = csrfTokenInput.value;
    }

    try {
        const resposta = await fetch(`${window.location.origin}/ativar-biometria`, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify({ email, senha })
        });

        if (!resposta.ok) throw new Error(`Erro no servidor (Status ${resposta.status}).`);
        const resultado = await resposta.json();

        if (resultado.status === 'erro') throw new Error(resultado.mensagem);

        if (resultado.status === 'sucesso' && resultado.options) {
            btn.innerText = "Aguardando biometria do celular...";

            const opt = resultado.options.publicKey || resultado.options;

            // Conversão dos dados de texto para ArrayBuffer exigido pelo navegador
            opt.challenge = ueb64ParaBytes(opt.challenge);
            if (opt.user && opt.user.id) {
                opt.user.id = ueb64ParaBytes(opt.user.id);
            }

            let credencialNativa;
            try {
                // Aciona o sensor biométrico do aparelho
                credencialNativa = await navigator.credentials.create({ publicKey: opt });
            } catch (hardwareError) {
                throw new Error(`Erro nativo do dispositivo: [${hardwareError.name}] - ${hardwareError.message}`);
            }

            btn.innerText = "Salvando credencial no FeedIn...";

            const dadosParaEnviar = {
                id: credencialNativa.id,
                rawId: bytesParaUeb64(credencialNativa.rawId),
                type: credencialNativa.type,
                response: {
                    attestationObject: bytesParaUeb64(credencialNativa.response.attestationObject),
                    clientDataJSON: bytesParaUeb64(credencialNativa.response.clientDataJSON)
                }
            };

            const headersConclusao = { 'Content-Type': 'application/json' };
            if (csrfTokenInput && csrfTokenInput.value) {
                headersConclusao['X-CSRFToken'] = csrfTokenInput.value;
            }

            const respostaServidor = await fetch('/concluir-cadastro-biometria', {
                method: 'POST',
                headers: headersConclusao,
                body: JSON.stringify(dadosParaEnviar)
            });

            if (!respostaServidor.ok) throw new Error("Erro ao salvar a credencial no servidor.");
            const resultadoFinal = await respostaServidor.json();

            if (resultadoFinal.status === 'sucesso') {
                alert("Face ID / Biometria vinculada com sucesso no FeedIn!");
                window.location.href = '/login';
            } else {
                throw new Error(resultadoFinal.mensagem || "Erro ao registrar credencial.");
            }
        }

    } catch (error) {
        console.error(error);
        erroDiv.innerText = error.message;
        erroDiv.classList.remove('d-none');
        btn.disabled = false;
        btn.innerText = "Validar e Ativar Biometria";
    }
});
</script>

</body>
</html>
