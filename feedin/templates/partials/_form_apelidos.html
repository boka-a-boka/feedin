<div class="mt-2">
    <form action="{{ url_for('adicionar_apelido') }}" method="POST" class="d-flex gap-2 mb-3">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <input type="text"
               name="apelido"
               id="input-novo-apelido"
               class="form-control rounded-pill"
               placeholder="Ex: Carlão, Tim, Cê"
               required>

        <button type="submit" class="btn btn-secondary rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
            <i class="bi bi-plus-lg"></i>
        </button>
    </form>

    <div id="lista-apelidos" class="d-flex flex-wrap gap-2 mt-2">
        {% if perfil.apelidos %}
            {% for apelido in perfil.apelidos %}
                <div class="btn-group shadow-sm animate__animated animate__fadeIn">
                    <span class="badge rounded-start-pill bg-light text-dark border border-end-0 d-flex align-items-center px-3 py-2">
                        {{ apelido.apelido }}
                    </span>
                    <a href="{{ url_for('excluir_apelido', id_apelido=apelido.id) }}"
                       class="btn btn-sm btn-light border border-start-0 rounded-end-pill text-danger d-flex align-items-center px-2">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            {% endfor %}
        {% else %}
            <p class="text-muted small mb-0 p-1"><i class="bi bi-info-circle me-1"></i> Nenhum apelido cadastrado ainda.</p>
        {% endif %}
    </div>
</div>

<script>
function enviarNovoApelido() {
    const input = document.getElementById('input-novo-apelido');
    const valor = input.value.trim();
    const listaApelidos = document.getElementById('lista-apelidos');

    if (valor) {
        // Criamos o FormData para enviar os dados via AJAX
        const formData = new FormData();
        const csrfToken = document.querySelector('input[name="csrf_token"]').value;

        formData.append('csrf_token', csrfToken);
        formData.append('apelido', valor);

        // Faz o envio em segundo plano para a rota que você já tem pronta
        fetch Muse ("{{ url_for('adicionar_apelido') }}", {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest' // Avisa o Flask que é uma requisição AJAX
            }
        })
        .then(response => {
            if (response.redirected) {
                // Se a rota responder com sucesso, em vez de recarregar a página inteira,
                // nós apenas criamos a badge visualmente na tela para manter o formulário intacto!

                // Remove a mensagem de "Nenhum apelido cadastrado" se ela existir
                if (listaApelidos.querySelector('p')) {
                    listaApelidos.innerHTML = '';
                }

                // Cria o elemento da nova badge dinamicamente (Visual igual ao seu)
                const novoGrupo = document.createElement('div');
                novoGrupo.className = 'btn-group shadow-sm animate__animated animate__fadeIn';
                novoGrupo.innerHTML = `
                    <span class="badge rounded-start-pill bg-white text-dark border border-end-0 d-flex align-items-center px-3 py-2">
                        ${valor}
                    </span>
                    <button type="button" class="btn btn-sm btn-light border border-start-0 border-end-0 text-muted px-2" disabled>
                        <i class="bi bi-pencil-square"></i>
                    </button>
                    <button type="button" class="btn btn-sm btn-light border border-start-0 rounded-end-pill text-danger px-2" onclick="window.location.reload();">
                        <i class="bi bi-x-lg"></i>
                    </button>
                `;

                listaApelidos.appendChild(novoGrupo);
                input.value = ''; // Limpa apenas o campo do apelido!
            } else {
                alert("Erro ao salvar o apelido temporariamente.");
            }
        })
        .catch(err => console.error("Erro na requisição Fetch:", err));
    }
}
</script>
