<!-- Estilos específicos do Painel de Interesses -->
<style>
    .categoria-wrapper button:not(.collapsed) i.bi-chevron-down { transform: rotate(180deg); }
    .categoria-wrapper i.bi-chevron-down { transition: transform 0.3s ease; }

    @keyframes pulse-small { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    .badge-pulse { animation: pulse-small 0.3s ease-out; }

    .pref-tag {
        transition: all 0.2s ease;
        cursor: pointer;
        border: none !important;
    }
    .pref-tag:hover {
        filter: brightness(1.1);
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0,0,0,0.1) !important;
    }

    #sugestoes-wrapper {
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #dee2e6;
        background: white;
    }

    .cursor-pointer { cursor: pointer; }
</style>

<!-- Bloco de Progresso do Pioneiro -->
{% if current_user.nivel_acesso < 10 %}
<div class="mb-4" id="container-progresso-pioneiro">
    <div class="card border-0 shadow-sm rounded-4 p-4 bg-white">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="fw-bold text-primary mb-0">Sua Jornada no Feed In!</h6>
            <span id="contador-label" class="badge bg-primary rounded-pill fs-6">0 / 10</span>
        </div>

        <p class="text-muted small mb-3">
            <i class="bi bi-info-circle me-1"></i>
            Selecione pelo menos <strong>10 interesses</strong>. Isso nos ajuda a calibrar o FeedIn para que sua experiência em Piracicaba seja incrível!
        </p>

        <div class="progress" style="height: 12px; border-radius: 10px;">
            <div id="barra-progresso" class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                 role="progressbar" style="width: 0%"></div>
        </div>
    </div>
</div>
{% endif %}

<form action="{{ url_for('salvar_preferencias') }}" method="POST" id="form-preferencias">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <!-- Inputs que o backend vai ler -->
    <input type="hidden" name="preferencias_ids" id="preferencias_ids">
    <input type="hidden" name="novos_termos" id="novos_termos">

    <!-- Campo de Busca (Otimizado para os 1.735 itens) -->
    <div class="mb-5 position-relative">
        <label class="form-label fw-bold">O que você curte ou busca em Piracicaba?</label>
        <div class="input-group">
            <span class="input-group-text bg-white border-end-0 rounded-start-4"><i class="bi bi-search text-muted"></i></span>
            <input type="text" id="busca-interesse" class="form-control form-control-lg border-start-0 shadow-none rounded-end-4"
                   placeholder="Ex: Samba, Cerveja Artesanal, Pet Friendly..." autocomplete="off">
        </div>
        <div id="sugestoes-wrapper" class="list-group shadow-lg position-absolute w-100 d-none" style="z-index: 1000;"></div>
    </div>

    <!-- Categoria: Pessoais -->
    <div class="categoria-wrapper mb-3">
        <button class="btn btn-light w-100 d-flex justify-content-between align-items-center border-0 p-3 rounded-4 shadow-sm"
                type="button" data-bs-toggle="collapse" data-bs-target="#collapsePessoais">
            <div class="d-flex align-items-center text-primary">
                <i class="bi bi-person-heart me-2 fs-5"></i>
                <span class="fw-bold">MEUS INTERESSES PESSOAIS</span>
            </div>
            <span class="badge rounded-pill bg-primary px-3" id="badge-count-pessoais">0</span>
        </button>
        <div class="collapse show mt-2" id="collapsePessoais">
            <div id="tags-pessoais" class="d-flex flex-wrap gap-2 p-2 border-start border-2 ms-3"></div>
        </div>
    </div>

    <!-- Categoria: Marcas -->
    <div class="categoria-wrapper mb-3">
        <button class="btn btn-light w-100 d-flex justify-content-between align-items-center border-0 p-3 rounded-4 shadow-sm"
                type="button" data-bs-toggle="collapse" data-bs-target="#collapseMarcas">
            <div class="d-flex align-items-center text-info">
                <i class="bi bi-tag-fill me-2 fs-5"></i>
                <span class="fw-bold">MINHAS MARCAS & ESTILO</span>
            </div>
            <span class="badge rounded-pill bg-info text-dark px-3" id="badge-count-marcas">0</span>
        </button>
        <div class="collapse mt-2" id="collapseMarcas">
            <div id="tags-marcas" class="d-flex flex-wrap gap-2 p-2 border-start border-2 ms-3 border-info"></div>
        </div>
    </div>

    <!-- Categoria: Locais -->
    <div class="categoria-wrapper mb-5">
        <button class="btn btn-light w-100 d-flex justify-content-between align-items-center border-0 p-3 rounded-4 shadow-sm"
                type="button" data-bs-toggle="collapse" data-bs-target="#collapseLocais">
            <div class="d-flex align-items-center text-warning-emphasis">
                <i class="bi bi-shop me-2 fs-5"></i>
                <span class="fw-bold">O QUE VALORIZO EM LOCAIS</span>
            </div>
            <span class="badge rounded-pill bg-warning text-dark px-3" id="badge-count-locais">0</span>
        </button>
        <div class="collapse mt-2" id="collapseLocais">
            <div id="tags-locais" class="d-flex flex-wrap gap-2 p-2 border-start border-2 ms-3 border-warning"></div>
        </div>
    </div>

    <div id="painel-interesses-container">
        <!-- Dados iniciais do usuário -->
        <div id="data-prefs" data-minhas-prefs='{{ minhas_prefs_json | safe }}' style="display: none;"></div>

        <div class="text-center mt-4">
            <button type="submit" id="btn-salvar-preferencias" class="btn btn-primary btn-lg rounded-pill px-5 opacity-50" disabled>
                Atualizar Preferências
            </button>
            <p id="aviso-minimo" class="text-danger small mt-2 fw-bold">Selecione pelo menos 10 itens para atingir o selo de Pioneiro.</p>
        </div>
    </div>
</form>

<script>
(function() {
    // 1. ESTADO INTERNO (Map garante IDs únicos)
    var selecionados = new Map();

    // Elementos de Referência
    const refs = {
        inputBusca: document.getElementById('busca-interesse'),
        sugestoes: document.getElementById('sugestoes-wrapper'),
        barra: document.getElementById('barra-progresso'),
        contador: document.getElementById('contador-label'),
        btnSalvar: document.getElementById('btn-salvar-preferencias'),
        aviso: document.getElementById('aviso-minimo'),
        containerPessoais: document.getElementById('tags-pessoais'),
        containerLocais: document.getElementById('tags-locais'),
        containerMarcas: document.getElementById('tags-marcas'),
        badgePessoais: document.getElementById('badge-count-pessoais'),
        badgeLocais: document.getElementById('badge-count-locais'),
        badgeMarcas: document.getElementById('badge-count-marcas')
    };

    // 2. ATUALIZAÇÃO DA INTERFACE (Sincroniza Map -> DOM)
    function atualizarInterface() {
        // Limpa os containers antes de re-popular
        refs.containerPessoais.innerHTML = '';
        refs.containerLocais.innerHTML = '';
        if (refs.containerMarcas) refs.containerMarcas.innerHTML = '';

        let idsNumericos = [];
        let nomesNovos = [];

        // Ordena e itera sobre os selecionados
        Array.from(selecionados.entries())
            .sort((a, b) => a[1].nome.localeCompare(b[1].nome))
            .forEach(([id, dados]) => {
                const tag = document.createElement('div');

                // Define Estilo com base no tipo (v_usu / v_neg)
                let config = { cor: 'bg-primary text-white', icone: 'bi-person' };

                if (dados.v_usu && dados.v_neg) {
                    config = { cor: 'bg-dark text-info border border-info', icone: 'bi-patch-check-fill' };
                } else if (!dados.v_usu && dados.v_neg) {
                    config = { cor: dados.isAutomated ? 'bg-warning-subtle text-warning-emphasis border border-warning shadow-sm' : 'bg-warning text-dark', icone: dados.isAutomated ? 'bi-magic' : 'bi-shop' };
                }

                tag.className = `badge rounded-pill p-2 px-3 active pref-tag ${config.cor} m-1 border-0 shadow-sm`;
                tag.innerHTML = `<i class="bi ${config.icone} me-1"></i> ${dados.nome} <i class="bi bi-x-circle ms-1 opacity-50"></i>`;

                tag.onclick = () => {
                    selecionados.delete(id);
                    atualizarInterface();
                };

                // Distribui nos containers corretos
                if (dados.v_usu && dados.v_neg && refs.containerMarcas) {
                    refs.containerMarcas.appendChild(tag);
                } else if (!dados.v_usu && dados.v_neg) {
                    refs.containerLocais.appendChild(tag);
                } else {
                    refs.containerPessoais.appendChild(tag);
                }

                // Prepara dados para os inputs ocultos
                if (id.toString().startsWith('novo_')) {
                    nomesNovos.push(dados.nome);
                } else {
                    idsNumericos.push(id);
                }
            });

        // Sincroniza inputs ocultos para o POST
        document.getElementById('preferencias_ids').value = idsNumericos.join(',');
        document.getElementById('novos_termos').value = nomesNovos.join(',');

        // Lógica de Progresso e Botão Salvar
        const total = selecionados.size;
        const perc = Math.min((total / 10) * 100, 100);

        if (refs.barra) {
            refs.barra.style.width = perc + '%';
            if (total >= 10) {
                refs.barra.classList.replace('bg-success', 'bg-primary');
                refs.aviso.classList.add('d-none');
            } else {
                refs.barra.classList.replace('bg-primary', 'bg-success');
                refs.aviso.classList.remove('d-none');
            }
        }

        if (refs.contador) refs.contador.innerText = `${total} / 10`;

        // Habilita botão apenas se tiver o mínimo funcional (ex: 5)
        if (refs.btnSalvar) {
            refs.btnSalvar.disabled = total < 5;
            refs.btnSalvar.classList.toggle('opacity-50', total < 5);
        }

        // Atualiza badges numéricas
        if (refs.badgePessoais) refs.badgePessoais.innerText = refs.containerPessoais.children.length;
        if (refs.badgeMarcas) refs.badgeMarcas.innerText = refs.containerMarcas ? refs.containerMarcas.children.length : 0;
        if (refs.badgeLocais) refs.badgeLocais.innerText = refs.containerLocais.children.length;
    }

    // 3. FUNÇÃO PARA ADICIONAR TAG (Chamada pelo Autocomplete)
    window.adicionarTagManual = function(id, nome, vUsu, vNeg, id_pai, nome_pai) {
        selecionados.set(id.toString(), {
            nome: nome,
            v_usu: vUsu,
            v_neg: vNeg,
            id_pai: id_pai
        });

        // Lógica automática para Categorias Pai (Ex: Selecionou Cerveja, adiciona Gastronomia)
        if (vUsu && vNeg && id_pai && nome_pai) {
            if (!selecionados.has(id_pai.toString())) {
                selecionados.set(id_pai.toString(), {
                    nome: nome_pai,
                    v_usu: false,
                    v_neg: true,
                    isAutomated: true
                });
            }
        }
        atualizarInterface();
    };

    // 4. LÓGICA DE BUSCA (API FETCH)
    if (refs.inputBusca) {
        refs.inputBusca.addEventListener('input', function(e) {
            let termo = e.target.value.trim();
            if (termo.length < 2) {
                refs.sugestoes.innerHTML = '';
                refs.sugestoes.classList.add('d-none');
                return;
            }

            fetch('/api/buscar-interesses-onboarding?q=' + encodeURIComponent(termo))
                .then(res => res.json())
                .then(dados => {
                    refs.sugestoes.innerHTML = '';
                    if (dados && dados.length > 0) {
                        dados.forEach(item => {
                            const btn = document.createElement('button');
                            btn.type = 'button';
                            btn.className = 'list-group-item list-group-item-action d-flex justify-content-between align-items-center border-0 py-3';

                            let iconeMenu = item.v_usu && item.v_neg ? 'bi-patch-check-fill text-info' : (!item.v_usu && item.v_neg ? 'bi-shop text-warning' : 'bi-person text-primary');

                            btn.innerHTML = `
                                <span><i class="bi ${iconeMenu} me-2"></i> ${item.nome}</span>
                                <small class="text-muted" style="font-size: 0.7rem;">${item.categoria_pai || ''}</small>
                            `;

                            btn.onclick = () => {
                                window.adicionarTagManual(item.id, item.nome, item.v_usu, item.v_neg, item.id_pai, item.categoria_pai);
                                refs.inputBusca.value = '';
                                refs.sugestoes.classList.add('d-none');
                            };
                            refs.sugestoes.appendChild(btn);
                        });
                        refs.sugestoes.classList.remove('d-none');
                    } else {
                        mostrarSugerirNovo(termo);
                    }
                });
        });
    }

    function mostrarSugerirNovo(termo) {
        refs.sugestoes.innerHTML = `
            <button type="button" class="list-group-item list-group-item-action text-primary fw-bold py-3"
                    onclick="window.adicionarTagManual('novo_${termo}', '${termo}', true, false)">
                <i class="bi bi-plus-circle me-2"></i> Sugerir: "${termo}"
            </button>`;
        refs.sugestoes.classList.remove('d-none');
    }

    // Fecha sugestões ao clicar fora
    document.addEventListener('click', (e) => {
        if (!refs.inputBusca.contains(e.target)) refs.sugestoes.classList.add('d-none');
    });

    // 5. CARREGAMENTO INICIAL
    document.addEventListener('DOMContentLoaded', () => {
        const dataElement = document.getElementById('data-prefs');
        if (dataElement && dataElement.dataset.minhasPrefs) {
            try {
                const iniciais = JSON.parse(dataElement.dataset.minhasPrefs);
                iniciais.forEach(p => {
                    selecionados.set(p.id.toString(), {
                        nome: p.nome,
                        v_usu: p.v_usu ?? true,
                        v_neg: p.v_neg ?? false
                    });
                });
                atualizarInterface();
            } catch (e) { console.error("Erro JSON inicial:", e); }
        }
    });

    // Validação no Submit
    document.getElementById('form-preferencias').onsubmit = function() {
        if (selecionados.size < 5) {
            alert("Por favor, selecione pelo menos 5 interesses.");
            return false;
        }
        refs.btnSalvar.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Salvando...`;
        refs.btnSalvar.disabled = true;
    };

})();
</script>
