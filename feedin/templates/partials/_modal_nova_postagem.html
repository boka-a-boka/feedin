<div class="modal fade" id="modalNovaPostagem" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 rounded-4 shadow-lg">
            <div class="modal-header border-0 pb-0">
                <h5 class="fw-bold">Nova Memória em Piracicaba</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form action="{{ url_for('criar_postagem') }}" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="modal-body">
                    <!-- Upload de Imagem Compactado para Mobile -->
                    <div class="mb-3 text-center">
                        <div class="upload-placeholder border rounded-4 p-2 bg-light shadow-sm"
                             onclick="document.getElementById('imagem').click();"
                             style="cursor: pointer; border-style: dashed !important; border-color: #dee2e6 !important; min-height: 120px; display: flex; align-items: center; justify-content: center;">

                            <div id="previewContainer" class="d-none w-100">
                                <img id="imgPreview" src="#" alt="Sua Memória"
                                     class="img-fluid rounded-4"
                                     style="max-height: 350px; width: 100%; object-fit: contain;">
                                <p class="small text-primary mt-2 mb-0"><i class="bi bi-arrow-repeat"></i> Trocar fotografia</p>
                            </div>

                            <div id="placeholderContent">
                                <i class="bi bi-camera-fill display-6 text-secondary"></i>
                                <p class="mt-1 mb-0 small fw-bold text-muted">Qual a sua memória?</p>
                                <small class="text-muted" style="font-size: 0.75rem;">Clique para anexar foto (Opcional)</small>
                            </div>

                            <input type="file" name="imagem" id="imagem" class="d-none" accept="image/*" onchange="previewImagem(this)">
                        </div>
                    </div>

                    <!-- CAIXA DE TEXTO COM BARRA ERGONÔMICA FIXA/ANEXADA -->
                    <div class="mb-3 position-relative">
                        <label class="form-label small fw-bold text-muted text-uppercase mb-1" style="font-size: 0.7rem;">O que este momento representa?</label>

                        <!-- BARRA MOBILE ERGONÔMICA (Carrossel Horizontal Deslizante por Toque) -->
                        <div class="toolbar-mobile-container d-flex align-items-center bg-dark text-white p-1 rounded-top overflow-x-auto"
                             style="gap: 0.4rem; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none;">

                            <!-- Formatação Clássica -->
                            <button type="button" class="btn btn-sm btn-outline-light border-0 fw-bold px-3 py-2" onclick="formatarTextoMobile('*')">N</button>
                            <button type="button" class="btn btn-sm btn-outline-light border-0 fst-italic px-3 py-2" onclick="formatarTextoMobile('_')">I</button>
                            <button type="button" class="btn btn-sm btn-outline-light border-0 px-3 py-2" onclick="formatarTextoMobile('>')">“ ”</button>

                            <div class="vr bg-secondary my-1" style="width: 1px; height: 20px;"></div>

                            <!-- Ditador de Voz Inteligente -->
                            <button type="button" id="btn-ditador-voz" class="btn btn-sm btn-danger rounded-pill px-3 py-2 d-inline-flex align-items-center gap-1 small" onclick="alternarDitadoVoz()">
                                <i class="bi bi-mic-fill"></i> <span>🎙️ Voz</span>
                            </button>

                            <!-- Embelezador IA Assist (Mapeado) -->
                            <button type="button" class="btn btn-sm btn-outline-warning border-0 px-3 py-2 small" onclick="acionarEmbelezadorIA()">
                                <span>✨ Ajustar</span>
                            </button>

                            <div class="vr bg-secondary my-1" style="width: 1px; height: 20px;"></div>

                            <!-- Atalhos de Emojis Rápidos Ergonômicos -->
                            <button type="button" class="btn btn-sm btn-link text-decoration-none p-2" onclick="inserirEmojiMobile('☕')">☕</button>
                            <button type="button" class="btn btn-sm btn-link text-decoration-none p-2" onclick="inserirEmojiMobile('📸')">📸</button>
                            <button type="button" class="btn btn-sm btn-link text-decoration-none p-2" onclick="inserirEmojiMobile('❤️')">❤️</button>
                            <button type="button" class="btn btn-sm btn-link text-decoration-none p-2" onclick="inserirEmojiMobile('✨')">✨</button>
                            <button type="button" class="btn btn-sm btn-link text-decoration-none p-2" onclick="inserirEmojiMobile('🎶')">🎶</button>
                        </div>

                        <textarea name="conteudo" id="conteudoPostagem"
                                  class="form-control border-top-0 bg-light rounded-bottom p-3"
                                  rows="5"
                                  placeholder="Conte a história por trás desta memória..."
                                  style="border-top-left-radius: 0; border-top-right-radius: 0; font-size: 1rem; line-height: 1.5;"
                                  required></textarea>
                    </div>

                    <!-- COMPONENTES DE SELEÇÃO E METADADOS -->
                    <div class="row g-2">
                        <div class="col-md-12 position-relative">
                            <div class="input-group input-group-sm">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-geo-alt-fill text-danger"></i></span>
                                <input type="text" id="buscaLocalPost" class="form-control border-0 bg-light" placeholder="Onde foi isso (Nome do Local)?" autocomplete="off">
                                <input type="hidden" name="id_local" id="idLocalHidden">
                            </div>
                            <div id="sugestoesLocais" class="list-group shadow-sm position-absolute w-100 d-none" style="z-index: 1070;"></div>
                        </div>

                        <div class="col-md-6 position-relative">
                            <div class="input-group input-group-sm">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-person-plus-fill text-success"></i></span>
                                <input type="text" id="buscaPessoasPost" class="form-control border-0 bg-light" placeholder="Marcar amigos (@...)" autocomplete="off">
                            </div>
                            <input type="hidden" name="pessoas_ids" id="pessoasIdsHidden">
                            <div id="sugestoesPessoas" class="list-group shadow-sm position-absolute w-100 d-none" style="z-index: 1060;"></div>
                        </div>

                        <div class="col-md-6 position-relative">
                            <div class="input-group input-group-sm">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-tag-fill text-primary"></i></span>
                                <input type="text" id="buscaTagsPost" class="form-control border-0 bg-light" placeholder="Tags de afinidade" autocomplete="off">
                            </div>
                            <input type="hidden" name="tags_ids" id="tagsIdsHidden">
                            <div id="sugestoesTags" class="list-group shadow-sm position-absolute w-100 d-none" style="z-index: 1065;"></div>
                        </div>
                    </div>

                    <div id="containerBadges" class="d-flex flex-wrap gap-1 mt-3">
                        <div id="pessoasSelecionadas" class="d-flex flex-wrap gap-1"></div>
                        <div id="tagsSelecionadas" class="d-flex flex-wrap gap-1"></div>
                    </div>
                </div>

                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary rounded-pill px-5 fw-bold shadow">
                        Publicar Memória
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
// 1. Preview de Imagens
function previewImagem(input) {
    const container = document.getElementById('previewContainer');
    const preview = document.getElementById('imgPreview');
    const placeholder = document.getElementById('placeholderContent');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            preview.src = e.target.result;
            container.classList.remove('d-none');
            placeholder.classList.add('d-none');
        }
        reader.readAsDataURL(input.files[0]);
    }
}

// 2. Estado do Modal e Instância do Reconhecimento de Voz
const PostState = {
    tags: new Set(),
    pessoas: new Set()
};

let rVozInstancia = null;
let gravandoVoz = false;

// 3. Mecânica do Ditador de Voz Nativo (Web Speech API)
function alternarDitadoVoz() {
    const btn = document.getElementById('btn-ditador-voz');
    const txtArea = document.getElementById('conteudoPostagem');

    const ReconhecimentoDeVoz = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!ReconhecimentoDeVoz) {
        alert("O ditado por voz não é suportado pelo seu navegador atual. Tente usar o Google Chrome ou Safari Móvel.");
        return;
    }

    if (gravandoVoz) {
        // Para a gravação
        if (rVozInstancia) rVozInstancia.stop();
        return;
    }

    // Inicializa o motor de voz do aparelho móvel
    rVozInstancia = new ReconhecimentoDeVoz();
    rVozInstancia.lang = 'pt-BR';
    rVozInstancia.continuous = true;
    rVozInstancia.interimResults = false;

    rVozInstancia.onstart = function() {
        gravandoVoz = true;
        btn.classList.replace('btn-danger', 'btn-warning');
        btn.innerHTML = `<span class="spinner-grow spinner-grow-sm me-1" role="status"></span> <span>Gravando...</span>`;
    };

    rVozInstancia.onerror = function(e) {
        console.error("Erro no ditador:", e.error);
        pararInterfaceVoz();
    };

    rVozInstancia.onend = function() {
        pararInterfaceVoz();
    };

    rVozInstancia.onresult = function(event) {
        const resultadoTexto = event.results[event.results.length - 1][0].transcript;

        // Injeta o texto ditado exatamente onde o cursor móvel estiver posicionado
        const start = txtArea.selectionStart;
        const end = txtArea.selectionEnd;
        const textoOriginal = txtArea.value;

        txtArea.value = textoOriginal.substring(0, start) + resultadoTexto + textoOriginal.substring(end);
        txtArea.selectionStart = txtArea.selectionEnd = start + resultadoTexto.length;
        txtArea.focus();
    };

    rVozInstancia.start();
}

function pararInterfaceVoz() {
    gravandoVoz = false;
    const btn = document.getElementById('btn-ditador-voz');
    if (btn) {
        btn.classList.replace('btn-warning', 'btn-danger');
        btn.innerHTML = `<i class="bi bi-mic-fill"></i> <span>🎙️ Voz</span>`;
    }
}

// 4. Mecânica Ergonômica de Inserção de Formatação e Emojis
function formatarTextoMobile(caractere) {
    const txtArea = document.getElementById('conteudoPostagem');
    if (!txtArea) return;

    const start = txtArea.selectionStart;
    const end = txtArea.selectionEnd;
    const textoCompleto = txtArea.value;
    const textoSelecionado = textoCompleto.substring(start, end);

    let textoFormatado = "";
    let novoCursorPos = start;

    if (caractere === '>') {
        textoFormatado = textoCompleto.substring(0, start) + "\n> " + textoSelecionado + textoCompleto.substring(end);
        novoCursorPos = start + 3 + textoSelecionado.length;
    } else {
        textoFormatado = textoCompleto.substring(0, start) + caractere + textoSelecionado + caractere + textoCompleto.substring(end);
        novoCursorPos = start + 1 + textoSelecionado.length + 1;
    }

    txtArea.value = textoFormatado;
    txtArea.focus();
    txtArea.setSelectionRange(novoCursorPos, novoCursorPos);
}

function inserirEmojiMobile(emoji) {
    const txtArea = document.getElementById('conteudoPostagem');
    if (!txtArea) return;

    const start = txtArea.selectionStart;
    const end = txtArea.selectionEnd;
    const textoAnterior = txtArea.value;

    txtArea.value = textoAnterior.substring(0, start) + emoji + textoAnterior.substring(end);
    txtArea.selectionStart = txtArea.selectionEnd = start + emoji.length;
    txtArea.focus();
}

function acionarEmbelezadorIA() {
    alert("✨ O Embelezador de Memórias por Inteligência Artificial está sendo integrado ao servidor e estará ativo após a próxima virada de chaves no VPS!");
}

// 5. Autocomplete e Gerenciamento do Ciclo de Vida do DOM
document.addEventListener('DOMContentLoaded', function() {
    const modalEl = document.getElementById('modalNovaPostagem');
    if (!modalEl) return;

    const configurarBusca = (inputId, listaId, rota, callbackItem) => {
        const input = document.getElementById(inputId);
        const lista = document.getElementById(listaId);
        if (!input || !lista) return;

        input.addEventListener('input', function(e) {
            let termo = e.target.value.replace('@', '');
            if (termo.length < 2) { lista.classList.add('d-none'); return; }

            fetch(`${rota}?q=${encodeURIComponent(termo)}`)
                .then(res => {
                    if (!res.ok) throw new Error(`Erro: ${res.status}`);
                    return res.json();
                })
                .then(dados => {
                    lista.innerHTML = '';
                    if (!dados.length) { lista.classList.add('d-none'); return; }

                    dados.forEach(item => {
                        let btn = document.createElement('button');
                        btn.type = 'button';
                        btn.className = 'list-group-item list-group-item-action border-0 py-2';
                        btn.innerHTML = callbackItem(item);

                        btn.onclick = (event) => {
                            event.preventDefault();
                            if (inputId === 'buscaLocalPost') {
                                input.value = item.nome || item.name;
                                document.getElementById('idLocalHidden').value = item.id;
                            }
                            else if (inputId === 'buscaTagsPost') {
                                adicionarBadge(item.id, `#${item.nome}`, 'tagsSelecionadas', PostState.tags, 'tagsIdsHidden', 'bg-primary-subtle text-primary');
                                input.value = '';
                            }
                            else if (inputId === 'buscaPessoasPost') {
                                adicionarBadge(item.id, `@${item.username}`, 'pessoasSelecionadas', PostState.pessoas, 'pessoasIdsHidden', 'bg-success-subtle text-success');
                                input.value = '';
                            }
                            lista.classList.add('d-none');
                        };
                        lista.appendChild(btn);
                    });
                    lista.classList.remove('d-none');
                })
                .catch(err => {
                    console.error("Erro na busca remota do autocomplete:", err);
                    lista.innerHTML = '';
                    lista.classList.add('d-none');
                });
        });
    };

    configurarBusca('buscaLocalPost', 'sugestoesLocais', '/buscar_locais', item => `<i class="bi bi-geo-alt-fill me-2 text-danger"></i>${item.nome || item.name}`);
    configurarBusca('buscaTagsPost', 'sugestoesTags', '/api/buscar-interesses', item => `<i class="bi bi-hash me-2"></i>${item.nome}`);
    configurarBusca('buscaPessoasPost', 'sugestoesPessoas', '/buscar_usuarios', item => {
        const nomeExibicao = item.nome_completo ? item.nome_completo : item.username;
        return `
            <div class="d-flex align-items-center w-100">
                <i class="bi bi-person-circle me-2 text-success fs-5"></i>
                <div class="text-start">
                    <span class="d-block fw-bold text-dark small mb-0">${nomeExibicao}</span>
                    <small class="text-muted" style="font-size: 0.7rem;">@${item.username}</small>
                </div>
            </div>
        `;
    });

    // Evento de fechamento do modal (Garante parada do microfone e reseta campos)
    modalEl.addEventListener('hidden.bs.modal', function () {
        if (gravandoVoz && rVozInstancia) {
            rVozInstancia.stop();
        }

        PostState.tags.clear();
        PostState.pessoas.clear();

        document.getElementById('pessoasSelecionadas').innerHTML = '';
        document.getElementById('tagsSelecionadas').innerHTML = '';

        document.getElementById('idLocalHidden').value = '';
        document.getElementById('pessoasIdsHidden').value = '';
        document.getElementById('tagsIdsHidden').value = '';

        document.getElementById('previewContainer').classList.add('d-none');
        document.getElementById('placeholderContent').classList.remove('d-none');

        modalEl.querySelector('form').reset();
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.position-relative')) {
            document.querySelectorAll('.list-group').forEach(el => el.classList.add('d-none'));
        }
    });
});

// 6. Gerenciamento de Badges de Envio
function adicionarBadge(id, nome, containerId, setObj, inputHiddenId, extraClass) {
    if (setObj.has(id)) return;
    setObj.add(id);

    const container = document.getElementById(containerId);
    const badge = document.createElement('span');
    badge.className = `badge border-0 p-2 rounded-pill mb-1 me-1 animate__animated animate__fadeIn ${extraClass}`;
    badge.style.fontSize = '0.8rem';
    badge.innerHTML = `${nome} <i class="bi bi-x-circle ms-1" style="cursor:pointer"></i>`;

    badge.querySelector('i').onclick = () => {
        setObj.delete(id);
        badge.remove();
        document.getElementById(inputHiddenId).value = Array.from(setObj).join(',');
    };

    container.appendChild(badge);
    document.getElementById(inputHiddenId).value = Array.from(setObj).join(',');
}
</script>
