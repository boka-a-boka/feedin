<div class="container py-5">
    <div class="card bg-dark text-white border-primary shadow-lg">
        <div class="card-body p-5 text-center">
            <h2 class="mb-4">Sua Identidade, Nossa Segurança</h2>
            <p class="lead">Para garantir que o <strong>FeedIn</strong> seja um ambiente livre de fakes e seguro para todos, precisamos validar seu CPF.</p>

            <form action="{{ url_for('processar_identidade') }}" method="POST" class="mt-4 text-start">
                <div class="mb-3">
                    <label class="form-label">Nome Completo (Conforme Documento)</label>
                    <input type="text" name="nome_real" class="form-control bg-secondary text-white" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">CPF</label>
                    <input type="text" name="cpf" id="cpf_mask" class="form-control bg-secondary text-white" placeholder="000.000.000-00" required>
                </div>
                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" required id="lgpd">
                        <label class="form-check-label small" for="lgpd">
                            Li e concordo com os Termos de Responsabilidade e entendo que o uso indevido da plataforma ou crimes de ódio resultam em banimento imediato e entrega de logs às autoridades.
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Validar e Acessar</button>
            </form>
        </div>
    </div>
</div>
